<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium purple-blue gradient for the bubble -->
    <linearGradient id="grad-bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Cyber emerald-cyan gradient for the lightning and notification dot -->
    <linearGradient id="grad-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Sleek drop shadow filter -->
    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#8B5CF6" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Main Chat Bubble (Premium geometric path) -->
  <path d="M 38,22 H 62 A 14,14 0 0 1 76,36 V 52 A 14,14 0 0 1 62,66 H 50 L 38,78 L 44,66 H 38 A 14,14 0 0 1 24,52 V 36 A 14,14 0 0 1 38,22 Z" 
        fill="none" 
        stroke="url(#grad-bubble)" 
        stroke-width="5.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#soft-glow)" />

  <!-- Lightning Bolt (Sleek and sharp) -->
  <polygon points="55,30 38,48 48,48 45,60 62,45 52,45" 
           fill="url(#grad-glow)" />

  <!-- Glowing Notification Dot (Top right) -->
  <circle cx="76" cy="22" r="7.5" 
          fill="url(#grad-glow)" 
          stroke="#05070C" 
          stroke-width="3" />
</svg>
